<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LMNL Wallet Pass Preview</title>
    <style>
      :root {
        --page-bg: #ececf1;
        --pass-bg: rgb(255, 255, 255);
        --pass-fg: rgb(0, 0, 0);
        --pass-label: rgb(100, 100, 100);
        --shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
        --radius: 18px;
        --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 16px;
        background:
          radial-gradient(circle at top, rgba(77, 88, 124, 0.12), transparent 40%),
          linear-gradient(180deg, #f6f6fa 0%, #ebeaf1 100%);
        color: #111;
        font-family: var(--font);
      }

      .layout {
        width: min(1040px, 100%);
        display: grid;
        gap: 24px;
        grid-template-columns: 360px minmax(0, 1fr);
        align-items: start;
      }

      .panel {
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: 20px;
        padding: 20px;
        backdrop-filter: blur(12px);
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }

      .panel h1, .panel h2 {
        margin: 0 0 12px;
        font-size: 18px;
        letter-spacing: 0.04em;
      }

      .panel p {
        margin: 0 0 16px;
        color: #50545f;
        line-height: 1.45;
        font-size: 14px;
      }

      .code {
        display: block;
        margin-top: 10px;
        padding: 12px;
        border-radius: 12px;
        background: #0f172a;
        color: #dce7ff;
        font-size: 12px;
        line-height: 1.45;
        white-space: pre-wrap;
      }

      .phone {
        width: 100%;
        max-width: 420px;
        margin: 0 auto;
        padding: 26px 18px 22px;
        border-radius: 42px;
        background: linear-gradient(180deg, #f8f8fc 0%, #e9e8ef 100%);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.6), 0 20px 50px rgba(15, 23, 42, 0.18);
      }

      .status-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 26px;
        padding: 0 12px;
        font-weight: 600;
      }

      .wallet-pass {
        position: relative;
        overflow: hidden;
        background: var(--pass-bg);
        color: var(--pass-fg);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }

      .wallet-pass::before,
      .wallet-pass::after {
        content: "";
        position: absolute;
        top: 112px;
        width: 34px;
        height: 34px;
        border-radius: 999px;
        background: var(--page-bg);
      }

      .wallet-pass::before { left: -17px; }
      .wallet-pass::after { right: -17px; }

      .pass-header {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 18px 20px;
      }

      .pass-logo {
        width: 74px;
        height: 74px;
        object-fit: cover;
        background: #111;
      }

      .pass-logo-text {
        font-size: 26px;
        font-weight: 600;
        letter-spacing: -0.04em;
      }

      .pass-strip {
        width: 100%;
        height: 192px;
        object-fit: cover;
        background: linear-gradient(90deg, #02050a 0%, #0d1224 35%, #241735 100%);
      }

      .pass-body { padding: 18px 20px 22px; }

      .field-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px 28px;
      }

      .label {
        display: block;
        margin-bottom: 4px;
        color: var(--pass-label);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.06em;
      }

      .value {
        display: block;
        font-size: 24px;
        line-height: 1.05;
        letter-spacing: -0.04em;
        word-break: break-word;
      }

      .stack {
        margin-top: 18px;
        padding-top: 18px;
        border-top: 1px solid rgba(15, 23, 42, 0.08);
      }

      .notes {
        margin-top: 14px;
        padding: 14px 16px;
        border-radius: 14px;
        background: rgba(15, 23, 42, 0.04);
      }

      .notes .value {
        font-size: 15px;
        line-height: 1.45;
        letter-spacing: 0;
      }

      @media (max-width: 860px) {
        .layout { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="panel">
        <h1>Wallet Pass Preview</h1>
        <p>This mock now defaults to no title over the strip, matching the real pass generator.</p>
        <p>Edit the <strong>previewData</strong> block in this file, then refresh. Leave <strong>title</strong> blank to keep the strip clean.</p>
        <div class="code" id="configDump"></div>
      </aside>

      <main class="phone">
        <div class="status-bar">
          <span>13:26</span>
          <span>Wallet</span>
        </div>

        <section class="wallet-pass">
          <div class="pass-header">
            <img class="pass-logo" id="passLogo" src="./api/_lib/LMNL.pass/logo.png" alt="Logo" />
            <div class="pass-logo-text" id="logoText"></div>
          </div>

          <img class="pass-strip" id="stripImage" src="./api/_lib/LMNL.pass/strip.png" alt="Pass strip" />

          <div class="pass-body">
            <div class="field-grid">
              <div>
                <span class="label">DATE</span>
                <span class="value" id="dateValue"></span>
              </div>
              <div>
                <span class="label">TIME</span>
                <span class="value" id="timeValue"></span>
              </div>
              <div>
                <span class="label">LOCATION</span>
                <span class="value" id="locationValue"></span>
              </div>
              <div>
                <span class="label">GUEST</span>
                <span class="value" id="guestValue"></span>
              </div>
            </div>

            <div class="stack" id="titleBlock">
              <div>
                <span class="label">EVENT</span>
                <span class="value" id="titleValue" style="font-size: 72px;"></span>
              </div>
            </div>

            <div class="notes" id="notesBlock">
              <span class="label">NOTES</span>
              <span class="value" id="notesValue"></span>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script>
      const previewData = {
        logoText: "LMNL",
        title: "",
        date: "07.03.2026",
        time: "18:00",
        location: "LMNL COMPOUND",
        guest: "pass test",
        notes: "Doors at 6PM. Bring ID. This is a visual preview only.",
        backgroundColor: "rgb(255, 255, 255)",
        foregroundColor: "rgb(0, 0, 0)",
        labelColor: "rgb(100, 100, 100)",
        logoSrc: "./api/_lib/LMNL.pass/logo.png",
        stripSrc: "./api/_lib/LMNL.pass/strip.png"
      };

      document.documentElement.style.setProperty("--pass-bg", previewData.backgroundColor);
      document.documentElement.style.setProperty("--pass-fg", previewData.foregroundColor);
      document.documentElement.style.setProperty("--pass-label", previewData.labelColor);

      document.getElementById("logoText").textContent = previewData.logoText;
      document.getElementById("titleValue").textContent = previewData.title;
      document.getElementById("dateValue").textContent = previewData.date;
      document.getElementById("timeValue").textContent = previewData.time;
      document.getElementById("locationValue").textContent = previewData.location;
      document.getElementById("guestValue").textContent = previewData.guest;
      document.getElementById("notesValue").textContent = previewData.notes;
      document.getElementById("passLogo").src = previewData.logoSrc;
      document.getElementById("stripImage").src = previewData.stripSrc;
      document.getElementById("notesBlock").style.display = previewData.notes ? "block" : "none";
      document.getElementById("titleBlock").style.display = previewData.title ? "block" : "none";
      document.getElementById("configDump").textContent = JSON.stringify(previewData, null, 2);
    </script>
  </body>
</html>
