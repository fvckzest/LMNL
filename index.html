<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/pwa-192x192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/pwa-512x512.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://lmnl.art/" />

  <!-- Primary Meta Tags -->
  <title>LMNL</title>
  <meta name="title" content="LMNL" />
  <meta name="description" content="LMNL is a Tacoma-based art and culture platform creating events, media, design systems, creative services, and community experiences." />

  <!-- Open Graph / Facebook / iMessage -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="LMNL" />
  <meta property="og:url" content="https://lmnl.art/" />
  <meta property="og:title" content="LMNL" />
  <meta property="og:description" content="LMNL is a Tacoma-based art and culture platform creating events, media, design systems, creative services, and community experiences." />
  <meta property="og:image" content="https://lmnl.art/seo/home-seo.png" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://lmnl.art/" />
  <meta property="twitter:title" content="LMNL" />
  <meta property="twitter:description" content="LMNL is a Tacoma-based art and culture platform creating events, media, design systems, creative services, and community experiences." />
  <meta property="twitter:image" content="https://lmnl.art/seo/home-seo.png" />

  <meta name="theme-color" content="#FFFFFF" />
  <script>
    (function () {
      var hostname = window.location.hostname || '';
      if (!hostname.startsWith('admin.')) return;

      var adminUrl = 'https://admin.lmnl.art' + window.location.pathname;
      var ensureTag = function (selector, tagName, attrs) {
        var el = document.head.querySelector(selector);
        if (!el) {
          el = document.createElement(tagName);
          document.head.appendChild(el);
        }
        Object.keys(attrs).forEach(function (key) {
          el.setAttribute(key, attrs[key]);
        });
      };

      document.title = 'LMNL | Admin';
      ensureTag('meta[name="title"]', 'meta', { name: 'title', content: 'LMNL | Admin' });
      ensureTag('meta[name="description"]', 'meta', { name: 'description', content: 'Private LMNL admin interface.' });
      ensureTag('meta[name="robots"]', 'meta', { name: 'robots', content: 'noindex, nofollow' });
      ensureTag('meta[property="og:url"]', 'meta', { property: 'og:url', content: adminUrl });
      ensureTag('meta[property="og:title"]', 'meta', { property: 'og:title', content: 'LMNL | Admin' });
      ensureTag('meta[property="og:description"]', 'meta', { property: 'og:description', content: 'Private LMNL admin interface.' });
      ensureTag('meta[property="twitter:url"]', 'meta', { property: 'twitter:url', content: adminUrl });
      ensureTag('meta[property="twitter:title"]', 'meta', { property: 'twitter:title', content: 'LMNL | Admin' });
      ensureTag('meta[property="twitter:description"]', 'meta', { property: 'twitter:description', content: 'Private LMNL admin interface.' });
      ensureTag('link[rel="canonical"]', 'link', { rel: 'canonical', href: adminUrl });
    }());
  </script>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://lmnl.art/#organization",
          "name": "LMNL",
          "url": "https://lmnl.art/",
          "logo": "https://lmnl.art/lmnl-logo-black.png",
          "email": "hi@lmnl.art",
          "sameAs": [
            "https://instagram.com/lmnlart",
            "https://x.com/lmnlart",
            "https://discord.gg/hYYfTtyJzK"
          ]
        },
        {
          "@type": "WebSite",
          "@id": "https://lmnl.art/#website",
          "url": "https://lmnl.art/",
          "name": "LMNL",
          "publisher": {
            "@id": "https://lmnl.art/#organization"
          }
        },
        {
          "@type": "WebPage",
          "@id": "https://lmnl.art/#webpage",
          "url": "https://lmnl.art/",
          "name": "LMNL",
          "description": "LMNL is a Tacoma-based art and culture platform creating events, media, design systems, creative services, and community experiences.",
          "isPartOf": {
            "@id": "https://lmnl.art/#website"
          }
        }
      ]
    }
  </script>
</head>

<body>
  <div id="root"></div>

</html>
